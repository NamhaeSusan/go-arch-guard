name: Plugin Version Bump

on:
  push:
    branches: [main]
    paths:
      - SKILL.md
      - plugins/go-arch-guard/skills/go-arch-guard/SKILL.md

permissions:
  contents: write

jobs:
  bump-plugin-version:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Bump plugin version
        run: python3 scripts/bump_plugin_version.py

      - name: Commit version bump
        run: |
          if git diff --quiet -- plugins/go-arch-guard/.claude-plugin/plugin.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins/go-arch-guard/.claude-plugin/plugin.json
          git commit -m "chore: bump plugin version for skill update"
          git push
